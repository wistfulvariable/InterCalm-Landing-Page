<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterCalm — Design Variants</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #111;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            padding: 0 16px;
            flex-shrink: 0;
        }
        .header-title {
            color: #666;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 14px 16px 14px 0;
            border-right: 1px solid #222;
            margin-right: 4px;
            white-space: nowrap;
        }
        .tab-bar {
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab {
            padding: 14px 18px;
            color: #555;
            cursor: pointer;
            font-size: 13px;
            font-weight: 400;
            border-bottom: 2px solid transparent;
            transition: color 0.25s, border-color 0.25s;
            white-space: nowrap;
            user-select: none;
            position: relative;
        }
        .tab:hover { color: #aaa; }
        .tab.active {
            color: #fff;
            border-bottom-color: #fff;
        }
        .tab .num {
            color: #444;
            font-size: 11px;
            margin-right: 6px;
            font-weight: 500;
        }
        .tab.active .num { color: #888; }
        .viewer {
            flex: 1;
            position: relative;
        }
        .viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            inset: 0;
        }
        .keyboard-hint {
            position: fixed;
            bottom: 12px;
            right: 16px;
            color: #333;
            font-size: 11px;
            z-index: 10;
            display: flex;
            gap: 12px;
        }
        .keyboard-hint kbd {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 2px 6px;
            font-family: inherit;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">InterCalm Variants</div>
        <div class="tab-bar" id="tabs"></div>
    </div>
    <div class="viewer">
        <iframe id="frame"></iframe>
    </div>
    <div class="keyboard-hint">
        <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd> navigate</span>
    </div>
    <script>
        const variants = [
            { file: 'variant-01-breathing-ripples.html', name: 'Breathing Ripples' },
            { file: 'variant-02-floating-particles.html', name: 'Floating Particles' },
            { file: 'variant-03-sound-waves.html', name: 'Sound Waves' },
            { file: 'variant-04-soft-orb.html', name: 'Soft Orb' },
            { file: 'variant-05-morphing-blobs.html', name: 'Morphing Blobs' },
            { file: 'variant-06-type-cinema.html', name: 'Type Cinema' },
            { file: 'variant-07-flowing-lines.html', name: 'Flowing Lines' },
            { file: 'variant-08-dot-matrix.html', name: 'Dot Matrix' },
            { file: 'variant-09-light-sweep.html', name: 'Light Sweep' },
            { file: 'variant-10-warm-aurora.html', name: 'Warm Aurora' },
        ];

        let active = 0;
        const tabBar = document.getElementById('tabs');
        const frame = document.getElementById('frame');

        variants.forEach((v, i) => {
            const tab = document.createElement('div');
            tab.className = 'tab' + (i === 0 ? ' active' : '');
            tab.innerHTML = `<span class="num">${String(i + 1).padStart(2, '0')}</span>${v.name}`;
            tab.addEventListener('click', () => setActive(i));
            tabBar.appendChild(tab);
        });

        function setActive(i) {
            active = i;
            document.querySelectorAll('.tab').forEach((t, j) => {
                t.classList.toggle('active', j === i);
            });
            frame.src = variants[i].file;
            document.querySelectorAll('.tab')[i].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') setActive(Math.min(active + 1, variants.length - 1));
            if (e.key === 'ArrowLeft') setActive(Math.max(active - 1, 0));
        });

        setActive(0);
    </script>
</body>
</html>
