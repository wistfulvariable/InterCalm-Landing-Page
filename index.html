<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterCalm — Never Yell Across the House Again</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #FAF7F2;
            animation: bgBreathe 12s ease-in-out infinite;
        }
        @keyframes bgBreathe {
            0%, 100% { background-color: #FAF7F2; }
            50% { background-color: #F5F0E8; }
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Subtle grain overlay for materiality */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.028;
            z-index: 2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
        }

        .content {
            position: relative;
            z-index: 3;
            text-align: center;
        }

        /* Brand line with flanking accents */
        .brand-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(1rem, 3vw, 2.5rem);
        }
        .brand-line-accent {
            width: clamp(30px, 6vw, 70px);
            height: 1px;
            background: linear-gradient(90deg, transparent, #C8B99A);
            opacity: 0;
            transform: scaleX(0);
            transform-origin: right center;
            animation: lineGrow 1.4s cubic-bezier(0.16, 1, 0.3, 1) 2.8s forwards;
        }
        .brand-line-accent:last-child {
            background: linear-gradient(90deg, #C8B99A, transparent);
            transform-origin: left center;
        }

        /* Staggered letter reveal */
        .brand {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.3em;
            color: #2C2825;
            overflow: hidden;
        }
        .brand span {
            display: inline-block;
            opacity: 0;
            transform: translateY(25px);
            animation: letterReveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes letterReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Tagline */
        .tagline {
            font-size: clamp(0.85rem, 2.2vw, 1.1rem);
            font-weight: 300;
            color: #6B655B;
            letter-spacing: 0.06em;
            margin-top: 1.8rem;
            opacity: 0;
            transform: translateY(14px);
            animation: fadeUp 1.6s cubic-bezier(0.16, 1, 0.3, 1) 2s forwards;
        }

        /* Bottom content */
        .bottom-area {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 3;
            opacity: 0;
            animation: fadeIn 2s ease 3.2s forwards;
        }
        .coming-soon {
            font-size: 0.7rem;
            font-weight: 400;
            color: #A09789;
            letter-spacing: 0.28em;
            text-transform: uppercase;
        }
        .contact {
            margin-top: 0.9rem;
        }
        .contact a {
            font-size: 0.8rem;
            color: #A09789;
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .contact a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            width: 0;
            height: 1px;
            background: #2C2825;
            transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1), left 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .contact a:hover {
            color: #2C2825;
        }
        .contact a:hover::after {
            width: 100%;
            left: 0;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes lineGrow {
            to { opacity: 1; transform: scaleX(1); }
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>
    <div class="grain"></div>
    <div class="content">
        <div class="brand-line">
            <div class="brand-line-accent"></div>
            <h1 class="brand" id="brand"></h1>
            <div class="brand-line-accent"></div>
        </div>
        <p class="tagline">Never yell across the house again.</p>
    </div>
    <div class="bottom-area">
        <p class="coming-soon">Coming Soon</p>
        <p class="contact"><a href="mailto:support@getintercalm.com">support@getintercalm.com</a></p>
    </div>
    <script>
        // Staggered letter reveal — slower, 120ms per letter, starting at 0.6s
        const brandText = 'InterCalm';
        const brandEl = document.getElementById('brand');
        brandText.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.textContent = char;
            span.style.animationDelay = `${0.6 + i * 0.12}s`;
            brandEl.appendChild(span);
        });

        // Aurora canvas
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 6 ribbons for more depth and layering
        const ribbons = [
            { baseY: 0.25, amplitude: 90, width: 220, speed: 0.3, freq: 0.0012, color: [225, 215, 195], opacity: 0.07, phase: 0 },
            { baseY: 0.38, amplitude: 70, width: 190, speed: 0.4, freq: 0.0016, color: [215, 200, 175], opacity: 0.10, phase: 1.2 },
            { baseY: 0.50, amplitude: 55, width: 260, speed: 0.25, freq: 0.0019, color: [200, 185, 160], opacity: 0.09, phase: 2.5 },
            { baseY: 0.60, amplitude: 75, width: 170, speed: 0.45, freq: 0.0014, color: [220, 205, 182], opacity: 0.08, phase: 3.8 },
            { baseY: 0.72, amplitude: 65, width: 200, speed: 0.35, freq: 0.0017, color: [210, 195, 170], opacity: 0.06, phase: 5.0 },
            { baseY: 0.42, amplitude: 100, width: 140, speed: 0.2, freq: 0.001, color: [230, 220, 200], opacity: 0.05, phase: 6.2 },
        ];

        let t = 0;

        function drawRibbon(r) {
            const cy = h * r.baseY;
            ctx.beginPath();

            // Top edge with 3-frequency organic movement
            for (let x = 0; x <= w; x += 3) {
                const y = cy +
                    Math.sin(x * r.freq + t * r.speed + r.phase) * r.amplitude +
                    Math.sin(x * r.freq * 2.3 + t * r.speed * 0.6 + r.phase * 0.7) * r.amplitude * 0.3 +
                    Math.sin(x * r.freq * 0.5 + t * r.speed * 0.15) * r.amplitude * 0.15;
                if (x === 0) ctx.moveTo(x, y - r.width / 2);
                else ctx.lineTo(x, y - r.width / 2);
            }

            // Bottom edge (reverse)
            for (let x = w; x >= 0; x -= 3) {
                const y = cy +
                    Math.sin(x * r.freq + t * r.speed + r.phase) * r.amplitude +
                    Math.sin(x * r.freq * 2.3 + t * r.speed * 0.6 + r.phase * 0.7) * r.amplitude * 0.3 +
                    Math.sin(x * r.freq * 0.5 + t * r.speed * 0.15) * r.amplitude * 0.15;
                ctx.lineTo(x, y + r.width / 2);
            }

            ctx.closePath();

            // Gradient fill with soft center glow
            const gradient = ctx.createLinearGradient(0, cy - r.amplitude - r.width, 0, cy + r.amplitude + r.width);
            gradient.addColorStop(0, `rgba(${r.color.join(',')}, 0)`);
            gradient.addColorStop(0.2, `rgba(${r.color.join(',')}, ${r.opacity * 0.4})`);
            gradient.addColorStop(0.45, `rgba(${r.color.join(',')}, ${r.opacity})`);
            gradient.addColorStop(0.55, `rgba(${r.color.join(',')}, ${r.opacity * 1.3})`);
            gradient.addColorStop(0.8, `rgba(${r.color.join(',')}, ${r.opacity * 0.4})`);
            gradient.addColorStop(1, `rgba(${r.color.join(',')}, 0)`);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function animate() {
            t += 0.016;
            ctx.clearRect(0, 0, w, h);
            ribbons.forEach(drawRibbon);
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
