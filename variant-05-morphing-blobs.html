<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterCalm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #EDE8E0;
        }

        .blob-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            border-radius: 40% 60% 55% 45% / 55% 45% 60% 40%;
            filter: blur(60px);
            opacity: 0.5;
            mix-blend-mode: multiply;
        }
        .blob-1 {
            width: 55vmax;
            height: 55vmax;
            background: #E0D5C4;
            top: -10%;
            left: -10%;
            animation: morph1 15s ease-in-out infinite, drift1 20s ease-in-out infinite;
        }
        .blob-2 {
            width: 45vmax;
            height: 45vmax;
            background: #D4C8B4;
            bottom: -10%;
            right: -10%;
            animation: morph2 18s ease-in-out infinite, drift2 22s ease-in-out infinite;
        }
        .blob-3 {
            width: 35vmax;
            height: 35vmax;
            background: #E8DDD0;
            top: 30%;
            left: 40%;
            animation: morph3 12s ease-in-out infinite, drift3 16s ease-in-out infinite;
        }
        @keyframes morph1 {
            0%, 100% { border-radius: 40% 60% 55% 45% / 55% 45% 60% 40%; }
            25% { border-radius: 55% 45% 40% 60% / 45% 60% 35% 65%; }
            50% { border-radius: 45% 55% 65% 35% / 60% 40% 50% 50%; }
            75% { border-radius: 60% 40% 45% 55% / 35% 65% 55% 45%; }
        }
        @keyframes morph2 {
            0%, 100% { border-radius: 55% 45% 60% 40% / 40% 60% 45% 55%; }
            25% { border-radius: 45% 55% 35% 65% / 60% 40% 55% 45%; }
            50% { border-radius: 60% 40% 50% 50% / 45% 55% 40% 60%; }
            75% { border-radius: 35% 65% 55% 45% / 55% 45% 65% 35%; }
        }
        @keyframes morph3 {
            0%, 100% { border-radius: 50% 50% 45% 55% / 55% 45% 50% 50%; }
            33% { border-radius: 60% 40% 55% 45% / 40% 60% 45% 55%; }
            66% { border-radius: 40% 60% 50% 50% / 60% 40% 55% 45%; }
        }
        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(8vw, 6vh); }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-6vw, -8vh); }
        }
        @keyframes drift3 {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(5vw, -3vh); }
            66% { transform: translate(-4vw, 5vh); }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .brand {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.3em;
            color: #3A352F;
            opacity: 0;
            animation: emerge 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }
        .tagline {
            font-size: clamp(0.85rem, 2.2vw, 1.05rem);
            font-weight: 300;
            color: #5C564E;
            margin-top: 1.5rem;
            letter-spacing: 0.05em;
            opacity: 0;
            animation: fadeUp 0.8s ease 1.5s forwards;
        }
        .meta {
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 2s forwards;
        }
        .coming-soon {
            font-size: 0.72rem;
            font-weight: 400;
            color: #8A8279;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .contact {
            margin-top: 1rem;
        }
        .contact a {
            font-size: 0.82rem;
            color: #8A8279;
            text-decoration: none;
            transition: color 0.3s;
        }
        .contact a:hover { color: #3A352F; }
        @keyframes emerge {
            from { opacity: 0; transform: scale(0.92); filter: blur(8px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="content">
        <h1 class="brand">InterCalm</h1>
        <p class="tagline">Never yell across the house again.</p>
        <div class="meta">
            <p class="coming-soon">Coming Soon</p>
            <p class="contact"><a href="mailto:support@getintercalm.com">support@getintercalm.com</a></p>
        </div>
    </div>
</body>
</html>
