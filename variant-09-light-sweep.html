<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterCalm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #F0EBE3;
        }

        /* Light sweep effect */
        .light-sweep {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .light-beam {
            position: absolute;
            width: 120%;
            height: 100%;
            top: 0;
            left: -10%;
            background: linear-gradient(
                105deg,
                transparent 0%,
                transparent 35%,
                rgba(255, 250, 240, 0.5) 45%,
                rgba(255, 252, 245, 0.7) 50%,
                rgba(255, 250, 240, 0.5) 55%,
                transparent 65%,
                transparent 100%
            );
            animation: sweep 10s ease-in-out infinite;
        }
        .light-beam-2 {
            background: linear-gradient(
                95deg,
                transparent 0%,
                transparent 40%,
                rgba(245, 235, 220, 0.3) 48%,
                rgba(245, 235, 220, 0.4) 52%,
                rgba(245, 235, 220, 0.3) 56%,
                transparent 65%,
                transparent 100%
            );
            animation: sweep2 14s ease-in-out infinite;
            animation-delay: 3s;
        }
        @keyframes sweep {
            0% { transform: translateX(-80%); }
            50% { transform: translateX(80%); }
            100% { transform: translateX(-80%); }
        }
        @keyframes sweep2 {
            0% { transform: translateX(80%) rotate(2deg); }
            50% { transform: translateX(-80%) rotate(-2deg); }
            100% { transform: translateX(80%) rotate(2deg); }
        }

        /* Subtle grain overlay */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .brand {
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            font-weight: 200;
            letter-spacing: 0.35em;
            color: #2C2825;
            opacity: 0;
            animation: warmReveal 2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }
        .tagline {
            font-size: clamp(0.85rem, 2.2vw, 1.05rem);
            font-weight: 300;
            color: #6B655B;
            letter-spacing: 0.06em;
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeUp 1s ease 1.5s forwards;
        }
        .pill {
            display: inline-block;
            margin-top: 3rem;
            padding: 0.6rem 2rem;
            border: 1px solid rgba(180, 165, 140, 0.4);
            border-radius: 100px;
            opacity: 0;
            animation: fadeIn 0.8s ease 2s forwards;
        }
        .pill-text {
            font-size: 0.7rem;
            font-weight: 400;
            color: #8A8279;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .contact {
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeIn 0.6s ease 2.4s forwards;
        }
        .contact a {
            font-size: 0.82rem;
            color: #A09789;
            text-decoration: none;
            transition: color 0.3s;
        }
        .contact a:hover { color: #2C2825; }
        @keyframes warmReveal {
            from { opacity: 0; letter-spacing: 0.5em; filter: blur(4px); }
            to { opacity: 1; letter-spacing: 0.35em; filter: blur(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="light-sweep">
        <div class="light-beam"></div>
        <div class="light-beam light-beam-2"></div>
    </div>
    <div class="grain"></div>
    <div class="content">
        <h1 class="brand">InterCalm</h1>
        <p class="tagline">Never yell across the house again.</p>
        <div class="pill">
            <span class="pill-text">Coming Soon</span>
        </div>
        <p class="contact"><a href="mailto:support@getintercalm.com">support@getintercalm.com</a></p>
    </div>
</body>
</html>
