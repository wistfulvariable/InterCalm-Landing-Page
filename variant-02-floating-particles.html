<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterCalm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #F5F0E8;
        }
        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .brand {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.25em;
            color: #2C2825;
            opacity: 0;
            animation: fadeScale 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }
        .divider {
            width: 40px;
            height: 1px;
            background: #C8B99A;
            margin: 1.8rem auto;
            opacity: 0;
            transform: scaleX(0);
            animation: lineGrow 0.8s ease 1s forwards;
        }
        .tagline {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-weight: 300;
            color: #5C564E;
            letter-spacing: 0.04em;
            opacity: 0;
            animation: fadeUp 0.8s ease 1.2s forwards;
        }
        .coming-soon {
            font-size: 0.75rem;
            font-weight: 400;
            color: #8A8279;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.6s forwards;
        }
        .contact {
            margin-top: 1.2rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.9s forwards;
        }
        .contact a {
            font-size: 0.85rem;
            color: #8A8279;
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.3s;
        }
        .contact a:hover { color: #2C2825; }
        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes lineGrow {
            to { opacity: 1; transform: scaleX(1); }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="content">
        <h1 class="brand">InterCalm</h1>
        <div class="divider"></div>
        <p class="tagline">Never yell across the house again.</p>
        <p class="coming-soon">Coming Soon</p>
        <p class="contact"><a href="mailto:support@getintercalm.com">support@getintercalm.com</a></p>
    </div>
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor() { this.reset(true); }
            reset(initial) {
                this.x = Math.random() * w;
                this.y = initial ? Math.random() * h : h + 20;
                this.size = Math.random() * 3 + 1;
                this.speedY = -(Math.random() * 0.3 + 0.1);
                this.drift = (Math.random() - 0.5) * 0.15;
                this.opacity = Math.random() * 0.3 + 0.05;
                this.hue = Math.random() * 30 + 25;
            }
            update() {
                this.y += this.speedY;
                this.x += this.drift + Math.sin(this.y * 0.005) * 0.2;
                if (this.y < -20) this.reset(false);
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 30%, 70%, ${this.opacity})`;
                ctx.fill();
            }
        }

        const particles = Array.from({ length: 80 }, () => new Particle());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
