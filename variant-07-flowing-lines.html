<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterCalm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #F5F1EB;
        }
        svg.bg-lines {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .brand {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.3em;
            color: #2C2825;
        }
        .brand span {
            display: inline-block;
            opacity: 0;
            animation: charReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes charReveal {
            from { opacity: 0; transform: translateY(15px) rotate(3deg); }
            to { opacity: 1; transform: translateY(0) rotate(0); }
        }
        .tagline {
            font-size: clamp(0.85rem, 2.2vw, 1.05rem);
            font-weight: 300;
            color: #6B655B;
            letter-spacing: 0.05em;
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 1s forwards;
        }
        .footer-content {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            opacity: 0;
            animation: fadeIn 0.6s ease 1.5s forwards;
        }
        .coming-soon {
            font-size: 0.7rem;
            font-weight: 400;
            color: #A09789;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        .footer-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #C8B99A;
        }
        .contact a {
            font-size: 0.8rem;
            color: #A09789;
            text-decoration: none;
            transition: color 0.3s;
        }
        .contact a:hover { color: #2C2825; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>
    <svg class="bg-lines" id="lines" preserveAspectRatio="none"></svg>
    <div class="content">
        <h1 class="brand" id="brand"></h1>
        <p class="tagline">Never yell across the house again.</p>
    </div>
    <div class="footer-content">
        <span class="coming-soon">Coming Soon</span>
        <span class="footer-dot"></span>
        <span class="contact"><a href="mailto:support@getintercalm.com">support@getintercalm.com</a></span>
    </div>
    <script>
        // Stagger brand letters
        const brand = 'InterCalm';
        const el = document.getElementById('brand');
        brand.split('').forEach((char, i) => {
            const span = document.createElement('span');
            span.textContent = char;
            span.style.animationDelay = `${0.3 + i * 0.06}s`;
            el.appendChild(span);
        });

        // Flowing SVG lines
        const svg = document.getElementById('lines');
        const ns = 'http://www.w3.org/2000/svg';
        const LINE_COUNT = 12;
        const paths = [];

        function resize() {
            svg.setAttribute('viewBox', `0 0 ${window.innerWidth} ${window.innerHeight}`);
        }
        resize();
        window.addEventListener('resize', resize);

        for (let i = 0; i < LINE_COUNT; i++) {
            const path = document.createElementNS(ns, 'path');
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', `rgba(190, 175, 155, ${0.08 + (i / LINE_COUNT) * 0.1})`);
            path.setAttribute('stroke-width', '1');
            svg.appendChild(path);
            paths.push({
                el: path,
                baseY: (window.innerHeight / (LINE_COUNT + 1)) * (i + 1),
                amplitude: 15 + Math.random() * 20,
                frequency: 0.002 + Math.random() * 0.002,
                speed: 0.3 + Math.random() * 0.5,
                phase: Math.random() * Math.PI * 2,
            });
        }

        let t = 0;
        function animate() {
            t += 0.016;
            const w = window.innerWidth;
            paths.forEach(p => {
                let d = `M 0 ${p.baseY}`;
                for (let x = 0; x <= w; x += 4) {
                    const y = p.baseY +
                        Math.sin(x * p.frequency + t * p.speed + p.phase) * p.amplitude +
                        Math.sin(x * p.frequency * 2.3 + t * p.speed * 0.6) * p.amplitude * 0.3;
                    d += ` L ${x} ${y}`;
                }
                p.el.setAttribute('d', d);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
